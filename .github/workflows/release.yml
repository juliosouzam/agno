name: Release Agno

# Publishes every distribution in this repo whose pyproject version is not yet on
# PyPI, in dependency order. Publishing uses OIDC trusted publishing (no long-lived
# API tokens): each project on PyPI must be configured with this repo + workflow
# (release.yml) + environment (pypi) as a trusted publisher.
#
# Semantics:
# - version unchanged on PyPI  -> job succeeds without publishing (no-op release)
# - build or publish failure   -> job fails loudly; dependents do not publish
# - agno depends on agnoctl    -> agnoctl publishes first (needs-ordering)

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-agnoctl:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check whether this version is already on PyPI
        id: version
        run: |
          python -m pip install --quiet --upgrade pip build
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('libs/agnoctl/pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if curl -fsS "https://pypi.org/pypi/agnoctl/$VERSION/json" > /dev/null 2>&1; then
            echo "agnoctl $VERSION already on PyPI; skipping publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.version.outputs.publish == 'true'
        run: |
          cd libs/agnoctl
          python -m build

      - name: Publish to PyPI (trusted publishing)
        if: steps.version.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: libs/agnoctl/dist

  release-agno:
    # agno declares a dependency on agnoctl; publish agnoctl first so a fresh agno
    # release never points at a dist that has not landed.
    needs: [release-agnoctl]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check whether this version is already on PyPI
        id: version
        run: |
          python -m pip install --quiet --upgrade pip build
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('libs/agno/pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if curl -fsS "https://pypi.org/pypi/agno/$VERSION/json" > /dev/null 2>&1; then
            echo "agno $VERSION already on PyPI; skipping publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.version.outputs.publish == 'true'
        run: |
          cp README.md libs/agno/
          cd libs/agno
          python -m build

      - name: Publish to PyPI (trusted publishing)
        if: steps.version.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: libs/agno/dist

  release-agno-infra:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check whether this version is already on PyPI
        id: version
        run: |
          python -m pip install --quiet --upgrade pip build
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('libs/agno_infra/pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if curl -fsS "https://pypi.org/pypi/agno-infra/$VERSION/json" > /dev/null 2>&1; then
            echo "agno-infra $VERSION already on PyPI; skipping publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.version.outputs.publish == 'true'
        run: |
          cd libs/agno_infra
          python -m build

      - name: Publish to PyPI (trusted publishing)
        if: steps.version.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: libs/agno_infra/dist
